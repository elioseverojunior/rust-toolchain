---
# yamllint configuration — https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default

# Reuse the repo's .gitignore so vendored and generated YAML (node_modules,
# coverage, dist, .act, …) is never linted. This is what keeps `mise run
# yamllint` from failing on files we do not own.
ignore-from-file: .gitignore

rules:
  # YAML in GitHub Actions and tooling configs legitimately runs long:
  # ${{ ... }} expressions, and regexes such as GitVersion.yml's 180-char
  # bump-message patterns. Surface long lines as a warning, not a hard error.
  line-length:
    level: warning
  # `on:` / `off:` are required GitHub Actions keys, not booleans — don't flag
  # workflow mapping keys as truthy. Values are still checked.
  truthy:
    check-keys: false
  # These files intentionally omit the `---` document-start marker.
  document-start: disable
  # Action pins use the project convention `@<sha> # vX.Y.Z` with a single
  # space before the comment (generated by `mise run uapw`). Accept one space
  # so the mandated pinning style does not trip the linter.
  comments:
    min-spaces-from-content: 1
