# === Doctor / Diagnostics ===
[tasks.doctor]
description = "Diagnose toolchain and project state"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = """
#!/usr/bin/env bash
set -eo pipefail

echo "=== Platform: $(uname -s) ($(uname -m)) ==="

echo "-- Node toolchain (package.json engines) --"
v() {
    label="$1"
    shift
    out="$("$@" 2>/dev/null | head -1)"
    printf "  %-20s : %s\n" "$label" "${out:-MISSING}"
}

v node node --version
v bun bun --version
v npm npm --version

echo "-- GitHub CLI --"
v gh gh --version

echo "-- Mise --"
v mise mise --version

echo "-- Project state --"
printf "  %-20s : %s\n" "GITHUB_TOKEN" "${GITHUB_TOKEN:-NOT SET (run 'mise run gh:token:set')}"
"""

# === Commitlint ===
[tasks.commitlint]
description = "Lint commit message against conventional commits"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = """
#!/usr/bin/env bash
set -eo pipefail

# Check if commitlint is installed
if ! command -v commitlint &> /dev/null; then
    echo "commitlint not found. Installing..."
    bunx --bun npm install -g @commitlint/cli @commitlint/config-conventional
fi

# If commit message file is provided as arg, use it
if [ $# -gt 0 ]; then
    commitlint --edit "$1"
else
    # Read from stdin (for git commit-msg hook)
    cat | commitlint
fi
"""

# === Commitlint Config ===
[tasks."commitlint:config"]
description = "Generate commitlint config from commit-types.toml"
alias = []
depends = []
depends_post = []
shell = "bash -c"
run = "npx @commitlint/config-conventional > commitlint.config.js"
