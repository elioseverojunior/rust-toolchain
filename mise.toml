# mise.toml - Task runner and tool version manager
# https://mise.jdx.dev/
# This replaces package.json scripts with mise tasks for better tool version management
[settings]
color = true
experimental = true
idiomatic_version_file = true
# Let mise read the Node version from package.json's engines field
idiomatic_version_file_enable_tools = ["node"]
python.uv_venv_auto = "create|source"
legacy_version_file = false
lockfile = true
not_found_auto_install = true
quiet = true
### Debug
#verbose = true
#log_level = "debug"

[tools]
# Node version is read from package.json engines field via idiomatic_version_file
# bun and gh are provisioned by mise directly
actionlint = { version = "latest" }
bun = { version = "1.3" }
gh = { version = "latest" }
gitleaks = { version = "latest" }

# Cargo Tools
"cargo:yamllint-rs" = "latest"
"aqua:hk" = { version = "latest", os = [
    "linux",
    "windows",
    "macos/arm64",
], arch = [
    "arm64",
    "x64",
], locked = false }

[env]
ARCH = "{{exec(command='uname -m')}}"
GITHUB_TOKEN = "{{env.GITHUB_TOKEN | default(value='')}}"
PROJECT_NAME = "{{exec(command='basename $PWD')}}"

[hooks]
enter = { task = "setup" }
postinstall = '''
echo "Installed: $MISE_INSTALLED_TOOLS"
'''

[deps.bun]
auto = true

[deps.cargo]
auto = true

[deps.gh]
auto = true

[tasks.act]
description = "Test Workflow with Nektos/ACT Locally"
usage = '''
flag "-t --test <test>" {
  choices "act" "act-matrix"
  default "act"
  help "Test Case Workflow"
  env "ACT_TEST"
}
'''
run = '''
#!/usr/bin/env bash

set -eo pipefail

[ ! -d ".act" ] && mkdir -p .act/
[ ! -f ".act/.vars" ] && touch .act/.vars
[ ! -f ".act/.env" ] && touch .act/.env
[ ! -f ".act/event.json" ] && echo "{}" > .act/event.json
echo "Generating GitHub Token"
export GITHUB_TOKEN=$(gh auth token)
echo "GITHUB_TOKEN=$GITHUB_TOKEN" > .act/.secrets
act -W .github/workflows/tests/${usage_test?}.yml
unset GITHUB_TOKEN
'''

[tasks."act:matrix"]
description = "Test Workflow with Nektos/ACT using Matrix Locally"
run = '''
#!/usr/bin/env bash

set -eo pipefail

mise run act -t act-matrix
'''

[tasks.gitignore]
description = "Git Ignore Check"
hide = true
run = '''
git check-ignore -v .act/.secrets .act/.vars .act/.env .act/event.json .act/README.md
'''

# === Tool Installation ===
[tasks.setup]
alias = ["install", "dev:setup", "dev:up", "dev"]
description = "Install all mise-managed tools"
depends = []
depends_post = []
shell = "bash -c"
run = '''
#!/usr/bin/env bash

set -eo pipefail

echo "Listing mise tools..."
mise ls

echo "Installing mise tools..."
mise lock
mise install
mise deps
bun install --lockfile-only
echo "Done, mise tools are installed/synced...."
'''

[tasks.update-actions-pins]
alias = ["update-actions", "uap"]
description = "Update SHA pins for GitHub Actions to latest release"
depends = []
depends_post = []
shell = "bash -c"
run = '''
#!/usr/bin/env bash

set -eo pipefail

export GITHUB_TOKEN=$(gh auth token)
echo "Updating All GitHub Actions workflows...."
python3 scripts/update-actions-pins.py "${@}"
unset GITHUB_TOKEN
'''

[tasks."update-actions-pins:write"]
alias = ["update-actions:write", "uapw"]
description = "Update SHA pins for GitHub Actions and write changes"
depends = []
depends_post = []
shell = "bash -c"
run = "mise run update-actions-pins --write"

[tasks."update-actions-pins:major"]
alias = ["update-actions:major", "uapm"]
description = "Update SHA pins and apply major version bumps"
depends = []
depends_post = []
shell = "bash -c"
run = "mise run update-actions-pins --write --apply-major"

[tasks.install-additional-deps]
description = "Install Project Dependencies"
depends_post = []
run = '''
echo "installing project '$PROJECT_NAME' dependencies for architecture '$ARCH'"
'''

