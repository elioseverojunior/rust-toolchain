run = "prettier --write ."

[tasks."fix:all"]
description = "Run all auto-fixes (ESLint + Prettier)"
alias = []
depends = ["eslint:lint:fix", "prettier:format:fix"]
depends_post = []
shell = "bash -c"
run = "true"

[tasks.actionlint]
alias = "al"
description = "Lint GitHub Actions workflows with actionlint (config in .github/actionlint.yaml); pass paths (e.g. lefthook {staged_files}) or default to all workflows"
run = '''
#!/usr/bin/env bash

set -eo pipefail

# actionlint auto-discovers .github/actionlint.yaml. With no paths it lints
# every workflow under .github/workflows; forward staged paths when given.
# Variadic args arrive shell-escaped — eval into an array so paths survive.
eval "paths=(${usage_paths:-})"
actionlint "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="workflow files to lint; defaults to every workflow under .github/workflows when omitted"'

[tasks.markdownlint]
alias = ["mdlint", "rumdl"]
description = "Lint Markdown files with rumdl"
depends = []
depends_post = []
shell = "bash -c"
run = '''
#!/usr/bin/env bash

set -eo pipefail

npx rumdl check "$@"
'''

[tasks."markdownlint:fix"]
alias = ["mdlint:fix", "rumdl:fix"]
description = "Fix Markdown files with rumdl"
depends = []
depends_post = []
shell = "bash -c"
run = '''
#!/usr/bin/env bash

set -eo pipefail

rumdl fmt "$@"
'''

[tasks.yamllint]
alias = ["yl"]
description = "Lint YAML with yamllint; pass paths (e.g. lefthook {staged_files}) or default to the whole repo"
run = '''
#!/usr/bin/env bash

set -eo pipefail

# Variadic args arrive as a shell-escaped string; eval into an array so paths
# with spaces survive. Fall back to the whole repo when no paths are passed.
eval "paths=(${usage_paths:-.})"
yamllint "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to lint; defaults to the whole repo when omitted"'

[tasks."yamllint:fix"]
alias = ["ylf"]
description = "Lint YAML with yamllint-rs; pass paths (e.g. lefthook {staged_files}) or default to the whole repo"
run = '''
#!/usr/bin/env bash

set -eo pipefail

# Safely check if the usage_paths variable is set and non-empty.
# ${usage_paths:-} prevents "unbound variable" errors under set -u.
if [ -n "${usage_paths:-}" ]; then
  # Note: To handle paths with spaces safely when using 'var=true',
  # mise recommends using eval to parse the shell-escaped string into an array.
  eval "paths=($usage_paths:-.)"
else
  mapfile -t paths < <(yamllint --list-files .)
fi

npx prettier --write "${paths[@]}"

# Run the linter
yamllint-rs --config .yamllint.yml --fix "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to lint; defaults to the whole repo when omitted"'

