# bunfig.toml
[install]
exact = true
frozenLockfile = false   # CI overrides via env

[test]
coverage = true
# Bun 1.3 supports only "text" and "lcov" out of the box. The CI coverage gate
# (Task 3) parses the lcov report directly, so a JSON summary reporter is not
# required at this layer.
coverageReporter = ["text", "lcov"]
# Bun 1.3 supports lines/functions/statements in the granular form (no `branches`).
# 1.0 == 100%; the gate fails the test step if any metric drops below.
coverageThreshold = { lines = 1.0, functions = 1.0, statements = 1.0 }
# Coverage is measured only on production source files. Two categories are
# excluded:
#   - **/dist/**      CLI bootstraps (e.g. scripts/bin/**, bootstrap/<name>/src/bin/**).
#                     The testable logic they wrap is covered in the sibling module.
#   - **/bin/**       CLI bootstraps (e.g. scripts/bin/**, bootstrap/<name>/src/bin/**).
#                     The testable logic they wrap is covered in the sibling module.
#   - **/__tests__/** Test infrastructure (e.g. Pulumi runtime mock setup files).
#                     These exist to enable tests; measuring them creates a
#                     perverse incentive to write trivial tests just to mark
#                     mock-callback lines as hit.
# 1.0 == 100% threshold above; the gate fails if any production file drops
# below.
coveragePathIgnorePatterns = [
  "**/dist/**",
  "**/bin/**",
  "**/__tests__/**",
  "**/integration-*/**",
]
